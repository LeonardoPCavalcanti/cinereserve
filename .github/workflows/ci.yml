name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Black (format check)
        run: poetry run black --check .

      - name: Run isort (import order check)
        run: poetry run isort --check-only --settings-file pyproject.toml .

      - name: Run Flake8 (linting)
        run: poetry run flake8 apps/ core/ config/ --max-line-length=120 --exclude='*/migrations/*'

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cinereserve_test
          POSTGRES_USER: cinereserve_user
          POSTGRES_PASSWORD: cinereserve_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinereserve_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DEBUG: "True"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      POSTGRES_DB: cinereserve_test
      POSTGRES_USER: cinereserve_user
      POSTGRES_PASSWORD: cinereserve_pass
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run migrations
        run: poetry run python manage.py migrate

      - name: Run tests with coverage
        run: poetry run pytest --cov=apps --cov=core --cov-report=term-missing -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cinereserve:test .

      - name: Verify Docker Compose config
        run: docker compose config --quiet
